<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Confirmar Exclusão</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <div class="container mt-5">
        <div class="card">
            <div class="card-header bg-danger text-white">
                <h4><i class="fas fa-exclamation-triangle me-2"></i>Confirmar Exclusão</h4>
            </div>
            <div class="card-body">
                <p>Tem certeza que deseja excluir a ocorrência de <strong>{{ ocorrencia.aluno.nome }}</strong> do dia <strong>{{ ocorrencia.data|date:"d/m/Y" }}</strong> às <strong>{{ ocorrencia.horario_chegada|time:"H:i" }}</strong>?</p>
                {% if ocorrencia.faltou %}
                    <p><span class="badge bg-warning">Faltou</span></p>
                {% endif %}
                <p class="text-muted">Esta ação não pode ser desfeita.</p>
                <form method="post">
                    {% csrf_token %}
                    <button type="submit" class="btn btn-danger">
                        <i class="fas fa-trash"></i> Sim, excluir
                    </button>
                    <a href="{% url 'controle_faltas_alunos' %}" class="btn btn-secondary">
                        <i class="fas fa-times"></i> Cancelar
                    </a>
                </form>
            </div>
        </div>
    </div>
</body>
</html>
