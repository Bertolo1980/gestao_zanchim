{% extends 'base_painel.html' %}

{% block title %}Login - Colégio Cívico Militar{% endblock %}

{% block extra_head %}
<style>
        body { background: linear-gradient(135deg, #1e3c72, #2a5298); min-height: 100vh; }
        .card { border: none; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.2); }
        .card-header { background: #0d6efd; color: white; border-radius: 15px 15px 0 0 !important; }
        .btn-primary { background: #0d6efd; border: none; padding: 10px; }
        .btn-primary:hover { background: #0b5ed7; }
    </style>
{% endblock %}

{% block content %}
<div class="position-absolute top-0 end-0 m-3">
        <a href="{% url 'menu_teste' %}" class="btn btn-outline-light btn-sm">
            <i class="fas fa-home me-1"></i>Voltar ao Início
        </a>
    </div>
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-5">
                <div class="card">
                    <div class="card-header text-center py-3">
                        <h4 class="mb-0"><i class="fas fa-shield-alt me-2"></i>Acesso Restrito</h4>
                    </div>
                    <div class="card-body p-4">
                        {% if form.errors %}
                            <div class="alert alert-danger">
                                <i class="fas fa-exclamation-triangle me-2"></i>
                                Usuário ou senha incorretos. Tente novamente.
                            </div>
                        {% endif %}
                        
                        <form method="post">
                            {% csrf_token %}
                            <div class="mb-3">
                                <label class="form-label"><i class="fas fa-user me-2"></i>Usuário</label>
                                <input type="text" name="username" class="form-control" required>
                            </div>
                            <div class="mb-4">
                                <label class="form-label"><i class="fas fa-lock me-2"></i>Senha</label>
                                <input type="password" name="password" class="form-control" required>
                            </div>
                            <button type="submit" class="btn btn-primary w-100">
                                <i class="fas fa-sign-in-alt me-2"></i>Entrar no Sistema
                            </button>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
{% endblock %}
