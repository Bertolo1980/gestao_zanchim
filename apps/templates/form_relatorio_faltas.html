{% extends 'base.html' %}
{% block content %}
<div class="container mt-4">
    <div class="card">
        <div class="card-header bg-primary text-white">
            <h4><i class="fas fa-print me-2"></i>Relatório de Faltas por Aluno</h4>
        </div>
        <div class="card-body">
            <form method="post">
                {% csrf_token %}
                <div class="row">
                    <div class="col-md-6 mb-3">
                        <label for="{{ form.turma.id_for_label }}" class="form-label">Turma</label>
                        {{ form.turma }}
                    </div>
                    <div class="col-md-6 mb-3">
                        <label for="{{ form.identificador.id_for_label }}" class="form-label">Número ou Nome</label>
                        {{ form.identificador }}
                    </div>
                </div>
                {% if erro %}
                    <div class="alert alert-danger">{{ erro }}</div>
                {% endif %}
                <button type="submit" class="btn btn-primary">Buscar</button>
                <a href="{% url 'painel_equipe' %}" class="btn btn-secondary">Voltar</a>
            </form>
        </div>
    </div>
</div>
{% endblock %}
