<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ recado.titulo }} - Colégio Cívico Militar</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body {
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            min-height: 100vh;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            padding: 20px;
        }
        .recado-card {
            background: white;
            border-radius: 20px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.1);
            max-width: 800px;
            margin: 0 auto;
            overflow: hidden;
        }
        .recado-header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px;
        }
        .recado-titulo {
            font-size: 2em;
            font-weight: bold;
            margin-bottom: 10px;
        }
        .recado-meta {
            font-size: 0.9em;
            opacity: 0.9;
        }
        .recado-meta i {
            margin-right: 5px;
        }
        .recado-body {
            padding: 40px;
            font-size: 1.1rem;
            line-height: 1.8;
        }
        .recado-footer {
            background: #f8f9fa;
            padding: 20px 30px;
            border-top: 1px solid #dee2e6;
        }
        .btn-voltar {
            background: #6c757d;
            color: white;
            border: none;
            padding: 10px 25px;
            border-radius: 50px;
            transition: 0.3s;
        }
        .btn-voltar:hover {
            background: #5a6268;
            transform: translateX(-5px);
        }
        .fixado-badge {
            background: #ffc107;
            color: #212529;
            padding: 3px 10px;
            border-radius: 20px;
            font-size: 0.8em;
            font-weight: normal;
        }
    </style>
</head>
<body>
    <div class="container">
        <a href="javascript:history.back()" class="btn btn-voltar mb-3">
            <i class="fas fa-arrow-left me-2"></i>Voltar
        </a>
        
        <div class="recado-card">
            <div class="recado-header">
                <div class="d-flex justify-content-between align-items-start">
                    <div class="recado-titulo">{{ recado.titulo }}</div>
                    {% if recado.fixado %}
                    <span class="fixado-badge">
                        <i class="fas fa-thumbtack me-1"></i>Fixado
                    </span>
                    {% endif %}
                </div>
                <div class="recado-meta">
                    <i class="fas fa-user-circle me-2"></i>Equipe Diretiva
                    <span class="mx-2">•</span>
                    <i class="far fa-calendar-alt me-2"></i>{{ recado.criado_em|date:"d/m/Y" }}
                    <span class="mx-2">•</span>
                    <i class="far fa-clock me-2"></i>{{ recado.criado_em|date:"H:i" }}
                </div>
            </div>
            
            <div class="recado-body">
                {{ recado.conteudo|safe }}
            </div>
            
            <div class="recado-footer">
                <div class="d-flex justify-content-between align-items-center">
                    <small class="text-muted">
                        <i class="fas fa-info-circle me-1"></i>
                        Publicado por Equipe Diretiva
                    </small>
                    <a href="javascript:history.back()" class="btn btn-sm btn-outline-secondary">
                        <i class="fas fa-arrow-left me-1"></i>Voltar
                    </a>
                </div>
            </div>
        </div>
    </div>
    
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
