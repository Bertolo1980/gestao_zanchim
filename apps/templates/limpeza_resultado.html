{% extends 'base.html' %}
{% block title %}Resultado da Limpeza{% endblock %}
{% block content %}
<div class="container mt-4">
    <div class="card">
        <div class="card-header bg-success text-white">
            <h4><i class="fas fa-broom me-2"></i>Limpeza do Sistema</h4>
        </div>
        <div class="card-body">
            <pre style="background:#f4f4f4; padding:15px; border-radius:5px; font-family:monospace; white-space:pre-wrap;">{{ output }}</pre>
            <a href="{% url 'painel_equipe' %}" class="btn btn-primary mt-3">
                <i class="fas fa-arrow-left"></i> Voltar ao Painel
            </a>
        </div>
    </div>
</div>
{% endblock %}
