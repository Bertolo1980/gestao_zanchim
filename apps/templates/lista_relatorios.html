<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Relatórios Mensais</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <div class="container mt-3 text-end">
        <a href="{% url 'menu_teste' %}" class="btn btn-outline-secondary btn-sm">
            <i class="fas fa-home me-1"></i>Voltar ao Início
        </a>
    </div>
    <div class="container mt-4">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h1><i class="fas fa-archive"></i> Relatórios Mensais</h1>
            <a href="{% url 'controle_faltas' %}" class="btn btn-secondary">Voltar</a>
        </div>
        <table class="table table-bordered">
            <thead class="table-dark">
                <tr>
                    <th>Arquivo</th>
                    <th>Abrir</th>
                </tr>
            </thead>
            <tbody>
                {% for arquivo in arquivos %}
                <tr>
                    <td>{{ arquivo.nome }}</td>
                    <td>
                        <a href="{{ arquivo.url }}" class="btn btn-sm btn-primary" target="_blank">Abrir</a>
                    </td>
                </tr>
                {% empty %}
                <tr>
                    <td colspan="2" class="text-center">Nenhum relatório encontrado.</td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>
</body>
</html>
